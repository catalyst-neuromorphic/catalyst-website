<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="950" height="900" viewBox="0 0 950 900">
  <style>
    text { font-family: Arial, sans-serif; font-size: 11px; fill: black; }
    .title { font-size: 14px; font-weight: bold; }
    .label { font-size: 10px; }
    .small { font-size: 9px; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="475" y="28" text-anchor="middle" class="title">Figure 8: Homeostatic Threshold Plasticity</text>

  <!-- ===== Epoch-Based Mechanism ===== -->
  <rect x="30" y="48" width="890" height="200" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="70" text-anchor="middle" font-weight="bold">Epoch-Based Threshold Adjustment Pipeline</text>
  <line x1="30" y1="78" x2="920" y2="78" stroke="black" stroke-width="0.5"/>

  <!-- Epoch counter -->
  <rect x="50" y="92" width="130" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="115" y="112" text-anchor="middle" font-weight="bold">Epoch Counter</text>
  <text x="115" y="128" text-anchor="middle" class="small">period: 1-255</text>
  <text x="115" y="142" text-anchor="middle" class="small">timesteps</text>

  <!-- Arrow Epoch -> Spike with "epoch end" label beside it (not overlapping) -->
  <line x1="180" y1="122" x2="230" y2="122" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="205" y="112" text-anchor="middle" class="small">epoch end</text>

  <!-- Spike counter -->
  <rect x="230" y="92" width="140" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="300" y="108" text-anchor="middle" font-weight="bold">Spike Counter</text>
  <text x="300" y="122" text-anchor="middle" class="small">n_spikes (per neuron)</text>
  <text x="300" y="136" text-anchor="middle" class="small">counts spikes in epoch</text>
  <text x="300" y="148" text-anchor="middle" class="small">reset at epoch boundary</text>

  <!-- Arrow Spike -> Compare -->
  <line x1="370" y1="122" x2="420" y2="122" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Comparison -->
  <rect x="420" y="92" width="140" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="490" y="108" text-anchor="middle" font-weight="bold">Compare</text>
  <text x="490" y="124" text-anchor="middle" class="small">error =</text>
  <text x="490" y="138" text-anchor="middle" class="small">n_spikes - n_target</text>

  <!-- Arrow Compare -> Scale -->
  <line x1="560" y1="122" x2="610" y2="122" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Proportional adjustment -->
  <rect x="610" y="92" width="140" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="680" y="108" text-anchor="middle" font-weight="bold">Scale</text>
  <text x="680" y="124" text-anchor="middle" class="small">adjustment =</text>
  <text x="680" y="138" text-anchor="middle" class="small">eta * error</text>

  <!-- Arrow Scale -> Clamp -->
  <line x1="750" y1="122" x2="790" y2="122" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Clamp + Update -->
  <rect x="790" y="92" width="120" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="850" y="108" text-anchor="middle" font-weight="bold">Clamp + Update</text>
  <text x="850" y="124" text-anchor="middle" class="small">theta_new =</text>
  <text x="850" y="138" text-anchor="middle" class="small">clamp(theta + adj,</text>
  <text x="850" y="148" text-anchor="middle" class="small">min, max)</text>

  <!-- Target rate input - 40px below pipeline, arrow going UP into Compare -->
  <rect x="440" y="195" width="120" height="30" fill="none" stroke="black" stroke-width="1"/>
  <text x="500" y="215" text-anchor="middle" class="small">n_target (config)</text>
  <line x1="500" y1="195" x2="500" y2="152" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Eta input - 40px below pipeline, arrow going UP into Scale -->
  <rect x="640" y="195" width="120" height="30" fill="none" stroke="black" stroke-width="1"/>
  <text x="700" y="215" text-anchor="middle" class="small">eta (learning rate)</text>
  <line x1="700" y1="195" x2="700" y2="152" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Complete Formula ===== -->
  <rect x="30" y="258" width="890" height="55" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="278" text-anchor="middle" font-weight="bold">Threshold Update Formula</text>
  <line x1="30" y1="286" x2="920" y2="286" stroke="black" stroke-width="0.5"/>
  <text x="475" y="304" text-anchor="middle" class="label" font-weight="bold">theta[k+1] = clamp( theta[k] + eta * (n_spikes - n_target), theta_min, theta_max )</text>

  <!-- ===== Behavior Diagrams ===== -->
  <!-- Left: Firing too fast -->
  <rect x="30" y="330" width="430" height="240" fill="none" stroke="black" stroke-width="2"/>
  <text x="245" y="352" text-anchor="middle" font-weight="bold">Neuron Firing Too Fast</text>
  <text x="245" y="366" text-anchor="middle" class="small">(n_spikes > n_target)</text>
  <line x1="30" y1="374" x2="460" y2="374" stroke="black" stroke-width="0.5"/>

  <!-- Axes -->
  <line x1="80" y1="388" x2="80" y2="540" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="540" x2="420" y2="540" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="72" y="388" text-anchor="end" class="small">theta</text>
  <text x="380" y="556" text-anchor="middle" class="small">epoch k</text>

  <!-- theta_max line - label INSIDE chart with margin from left axis -->
  <line x1="80" y1="400" x2="410" y2="400" stroke="black" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="100" y="396" class="small">theta_max</text>

  <!-- theta_min line - label INSIDE chart with margin from left axis -->
  <line x1="80" y1="530" x2="410" y2="530" stroke="black" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="100" y="526" class="small">theta_min</text>

  <!-- Increasing threshold curve -->
  <polyline points="100,500 140,490 180,482 220,476 260,472 300,470 340,468 380,466"
            fill="none" stroke="black" stroke-width="2"/>
  <text x="250" y="510" class="small">threshold increases</text>
  <text x="250" y="524" class="small">(reduces firing rate)</text>

  <!-- Right: Firing too slow -->
  <rect x="490" y="330" width="430" height="240" fill="none" stroke="black" stroke-width="2"/>
  <text x="705" y="352" text-anchor="middle" font-weight="bold">Neuron Firing Too Slow</text>
  <text x="705" y="366" text-anchor="middle" class="small">(n_spikes &lt; n_target)</text>
  <line x1="490" y1="374" x2="920" y2="374" stroke="black" stroke-width="0.5"/>

  <!-- Axes -->
  <line x1="540" y1="388" x2="540" y2="540" stroke="black" stroke-width="1.5"/>
  <line x1="540" y1="540" x2="880" y2="540" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="532" y="388" text-anchor="end" class="small">theta</text>
  <text x="840" y="556" text-anchor="middle" class="small">epoch k</text>

  <!-- theta_max line - label INSIDE chart with margin from left axis -->
  <line x1="540" y1="400" x2="870" y2="400" stroke="black" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="560" y="396" class="small">theta_max</text>

  <!-- theta_min line - label INSIDE chart with margin from left axis -->
  <line x1="540" y1="530" x2="870" y2="530" stroke="black" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="560" y="526" class="small">theta_min</text>

  <!-- Decreasing threshold curve -->
  <polyline points="560,420 600,430 640,438 680,444 720,448 760,450 800,451 840,452"
            fill="none" stroke="black" stroke-width="2"/>
  <text x="710" y="470" class="small">threshold decreases</text>
  <text x="710" y="484" class="small">(increases firing rate)</text>

  <!-- ===== Pipeline Integration Note ===== -->
  <rect x="30" y="590" width="890" height="190" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="614" text-anchor="middle" font-weight="bold">Pipeline Integration</text>
  <line x1="30" y1="622" x2="920" y2="622" stroke="black" stroke-width="0.5"/>

  <!-- Pipeline stages -->
  <rect x="80" y="640" width="130" height="45" fill="none" stroke="black" stroke-width="1"/>
  <text x="145" y="660" text-anchor="middle" class="small">SPIKE</text>
  <text x="145" y="674" text-anchor="middle" class="small">DELIVERY</text>

  <line x1="210" y1="662" x2="250" y2="662" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="250" y="640" width="160" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="330" y="660" text-anchor="middle" class="small" font-weight="bold">NEURON UPDATE</text>
  <text x="330" y="674" text-anchor="middle" class="small">(incl. homeostasis)</text>

  <line x1="410" y1="662" x2="450" y2="662" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="450" y="640" width="130" height="45" fill="none" stroke="black" stroke-width="1"/>
  <text x="515" y="660" text-anchor="middle" class="small">TRACE</text>
  <text x="515" y="674" text-anchor="middle" class="small">UPDATE</text>

  <line x1="580" y1="662" x2="620" y2="662" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="620" y="640" width="130" height="45" fill="none" stroke="black" stroke-width="1"/>
  <text x="685" y="660" text-anchor="middle" class="small">LEARNING</text>
  <text x="685" y="674" text-anchor="middle" class="small">ENGINE</text>

  <!-- Description text - well within box bounds with generous padding -->
  <text x="60" y="718" font-size="11">Homeostatic threshold plasticity operates in the NEURON UPDATE stage, independent of the</text>
  <text x="60" y="736" font-size="11">LEARNING ENGINE. This separation ensures threshold adaptation does not compete for</text>
  <text x="60" y="754" font-size="11">learning engine bandwidth or microcode cycles.</text>
</svg>