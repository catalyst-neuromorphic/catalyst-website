<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <style>
    text { font-family: Arial, sans-serif; font-size: 11px; fill: black; }
    .title { font-size: 14px; font-weight: bold; }
    .label { font-size: 10px; }
    .small { font-size: 9px; }
  </style>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" class="title">Figure 1: System-Level Architecture</text>

  <!-- Mesh Router (wide, spans all cores) -->
  <rect x="80" y="50" width="530" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="345" y="85" text-anchor="middle" font-weight="bold">Mesh Router</text>
  <text x="345" y="100" text-anchor="middle" class="small">(Spike Distribution Network)</text>

  <!-- 128 cores label (below core row) -->
  <text x="345" y="270" text-anchor="middle" class="small">128 cores total (Core 0 — Core 127)</text>

  <!-- Core 0 -->
  <rect x="90" y="175" width="130" height="80" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="155" y="205" text-anchor="middle" font-weight="bold">Core 0</text>
  <text x="155" y="220" text-anchor="middle" class="small">1024 neurons</text>
  <text x="155" y="233" text-anchor="middle" class="small">131K synapses</text>

  <!-- Core 1 -->
  <rect x="240" y="175" width="130" height="80" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="305" y="205" text-anchor="middle" font-weight="bold">Core 1</text>
  <text x="305" y="220" text-anchor="middle" class="small">1024 neurons</text>
  <text x="305" y="233" text-anchor="middle" class="small">131K synapses</text>

  <!-- Dots indicating cores 2-126 -->
  <text x="410" y="215" text-anchor="middle" font-size="16">. . .</text>
  <text x="410" y="235" text-anchor="middle" class="small">Cores 2–126</text>

  <!-- Core 127 -->
  <rect x="460" y="175" width="130" height="80" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="525" y="205" text-anchor="middle" font-weight="bold">Core 127</text>
  <text x="525" y="220" text-anchor="middle" class="small">1024 neurons</text>
  <text x="525" y="233" text-anchor="middle" class="small">131K synapses</text>

  <!-- Bidirectional arrows: router to Core 0 -->
  <line x1="150" y1="130" x2="150" y2="175" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="175" x2="160" y2="130" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bidirectional arrows: router to Core 1 -->
  <line x1="300" y1="130" x2="300" y2="175" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="175" x2="310" y2="130" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bidirectional arrows: router to Core 127 -->
  <line x1="520" y1="130" x2="520" y2="175" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="175" x2="530" y2="130" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Core internal structure (expanded view) -->
  <rect x="80" y="290" width="640" height="280" fill="none" stroke="black" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="310" text-anchor="middle" class="title">Core Detail (each of 128 cores)</text>

  <!-- Neuron Array -->
  <rect x="100" y="325" width="150" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="175" y="350" text-anchor="middle" font-weight="bold">Neuron Array</text>
  <text x="175" y="365" text-anchor="middle" class="small">1024 LIF/CUBA neurons</text>

  <!-- CSR Engine -->
  <rect x="100" y="405" width="150" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="175" y="425" text-anchor="middle" font-weight="bold">CSR Connectivity</text>
  <text x="175" y="440" text-anchor="middle" class="small">Index Table + Pool</text>
  <text x="175" y="453" text-anchor="middle" class="small">3 formats: S/D/P</text>

  <!-- Dendritic Compartments -->
  <rect x="280" y="325" width="150" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="355" y="345" text-anchor="middle" font-weight="bold">Dendritic Tree</text>
  <text x="355" y="360" text-anchor="middle" class="small">4 compartments/neuron</text>
  <text x="355" y="373" text-anchor="middle" class="small">ReLU + JoinOps</text>

  <!-- Learning Engine -->
  <rect x="280" y="405" width="150" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="355" y="425" text-anchor="middle" font-weight="bold">Learning Engine</text>
  <text x="355" y="440" text-anchor="middle" class="small">Microcode (14 opcodes)</text>
  <text x="355" y="453" text-anchor="middle" class="small">Eligibility + Reward</text>

  <!-- Delay Queue -->
  <rect x="460" y="325" width="150" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="535" y="345" text-anchor="middle" font-weight="bold">Delay Queue</text>
  <text x="535" y="360" text-anchor="middle" class="small">64 buckets x 64 entries</text>
  <text x="535" y="373" text-anchor="middle" class="small">0-63 timestep delays</text>

  <!-- Spike FIFO -->
  <rect x="460" y="405" width="150" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="535" y="425" text-anchor="middle" font-weight="bold">Spike FIFO</text>
  <text x="535" y="440" text-anchor="middle" class="small">Neuron ID + 8-bit</text>
  <text x="535" y="453" text-anchor="middle" class="small">graded payload</text>

  <!-- FSM -->
  <rect x="260" y="490" width="200" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="360" y="515" text-anchor="middle" font-weight="bold">FSM: DELIVER -> UPDATE -> LEARN</text>

  <!-- Internal connections -->
  <line x1="250" y1="355" x2="280" y2="355" stroke="black" stroke-width="1"/>
  <line x1="250" y1="435" x2="280" y2="435" stroke="black" stroke-width="1"/>
  <line x1="430" y1="355" x2="460" y2="355" stroke="black" stroke-width="1"/>
  <line x1="430" y1="435" x2="460" y2="435" stroke="black" stroke-width="1"/>

  <!-- Host Interface -->
  <rect x="680" y="50" width="100" height="80" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="730" y="85" text-anchor="middle" font-weight="bold">Host</text>
  <text x="730" y="100" text-anchor="middle" class="small">Interface</text>
  <line x1="610" y1="90" x2="680" y2="90" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="645" y="83" text-anchor="middle" class="small">UART/CMD</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>
