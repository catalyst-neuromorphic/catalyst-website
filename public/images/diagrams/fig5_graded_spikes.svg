<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <style>
    text { font-family: Arial, sans-serif; font-size: 11px; fill: black; }
    .title { font-size: 14px; font-weight: bold; }
    .small { font-size: 9px; }
    .mono { font-family: monospace; font-size: 10px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>

  <text x="400" y="25" text-anchor="middle" class="title">Figure 5: Graded Spike Delivery</text>

  <!-- Neuron membrane potential -->
  <rect x="30" y="60" width="180" height="100" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="120" y="80" text-anchor="middle" font-weight="bold">Spiking Neuron</text>
  <text x="120" y="100" text-anchor="middle" class="small">V_mem = potential + input - leak</text>
  <text x="120" y="120" text-anchor="middle" class="small">If V_mem > threshold:</text>
  <text x="120" y="135" text-anchor="middle" class="mono">payload = V_mem - threshold</text>
  <text x="120" y="150" text-anchor="middle" class="mono">clamp(payload, 1, 255)</text>

  <!-- Spike FIFO entry -->
  <rect x="270" y="70" width="200" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="370" y="90" text-anchor="middle" font-weight="bold">Spike FIFO Entry</text>
  <text x="370" y="110" text-anchor="middle" class="small">(NEURON_BITS + 8) bits wide</text>

  <!-- Bit fields -->
  <rect x="285" y="120" width="90" height="20" fill="none" stroke="black" stroke-width="1"/>
  <text x="330" y="135" text-anchor="middle" class="mono">neuron_id</text>
  <rect x="375" y="120" width="80" height="20" fill="none" stroke="black" stroke-width="1"/>
  <text x="415" y="135" text-anchor="middle" class="mono">payload</text>
  <text x="330" y="147" text-anchor="middle" class="small">(10 bits)</text>
  <text x="415" y="147" text-anchor="middle" class="small">(8 bits)</text>

  <!-- Arrow from neuron to FIFO -->
  <line x1="210" y1="110" x2="270" y2="110" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Weight lookup -->
  <rect x="270" y="190" width="200" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="370" y="210" text-anchor="middle" font-weight="bold">Synaptic Weight</text>
  <text x="370" y="228" text-anchor="middle" class="small">From connection pool (signed 16-bit)</text>

  <!-- Multiplier -->
  <rect x="540" y="100" width="200" height="100" fill="none" stroke="black" stroke-width="2"/>
  <text x="640" y="125" text-anchor="middle" font-weight="bold">Graded Multiply</text>
  <line x1="560" y1="140" x2="720" y2="140" stroke="black" stroke-width="0.5"/>
  <text x="640" y="160" text-anchor="middle" class="mono">product = weight x payload</text>
  <text x="640" y="178" text-anchor="middle" class="mono">current = product >> 7</text>
  <text x="640" y="193" text-anchor="middle" class="small">(GRADE_SHIFT = 7)</text>

  <!-- Arrows to multiplier -->
  <line x1="470" y1="130" x2="540" y2="140" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="505" y="125" text-anchor="middle" class="small">payload</text>
  <line x1="470" y1="215" x2="540" y2="165" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="505" y="200" text-anchor="middle" class="small">weight</text>

  <!-- Output to accumulator -->
  <rect x="540" y="240" width="200" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="640" y="265" text-anchor="middle" font-weight="bold">Target Accumulator += current</text>
  <line x1="640" y1="200" x2="640" y2="240" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Scaling explanation -->
  <rect x="30" y="260" width="450" height="120" fill="none" stroke="black" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="255" y="280" text-anchor="middle" font-weight="bold">Payload Scaling Effect</text>
  <text x="50" y="300" class="small">payload = 1:    current = weight x 1/128   = 0.78% of weight</text>
  <text x="50" y="315" class="small">payload = 64:   current = weight x 64/128  = 50% of weight</text>
  <text x="50" y="330" class="small">payload = 128:  current = weight x 128/128 = 100% of weight (unity)</text>
  <text x="50" y="345" class="small">payload = 200:  current = weight x 200/128 = 156% of weight</text>
  <text x="50" y="360" class="small">payload = 255:  current = weight x 255/128 = 199% of weight</text>
  <text x="255" y="378" text-anchor="middle" class="small">Enables continuous-valued transmission without rate/population codes</text>
</svg>
