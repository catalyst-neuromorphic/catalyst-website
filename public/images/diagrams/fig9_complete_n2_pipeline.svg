<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="950" height="740" viewBox="0 0 950 740">
  <style>
    text { font-family: Arial, sans-serif; font-size: 11px; fill: black; }
    .title { font-size: 14px; font-weight: bold; }
    .label { font-size: 10px; }
    .small { font-size: 9px; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="475" y="22" text-anchor="middle" class="title">Figure 9: Complete N2 Core Pipeline</text>
  <text x="475" y="38" text-anchor="middle" class="small">(N2 additions shown with bold/dashed borders; N1 baseline shown with thin borders)</text>

  <!-- ===== Stage 1: DELAY DRAIN (N1 baseline) ===== -->
  <rect x="20" y="55" width="125" height="80" fill="none" stroke="black" stroke-width="1"/>
  <text x="82" y="73" text-anchor="middle" class="small" font-weight="bold">STAGE 1</text>
  <text x="82" y="88" text-anchor="middle" font-weight="bold">DELAY</text>
  <text x="82" y="102" text-anchor="middle" font-weight="bold">DRAIN</text>
  <text x="82" y="118" text-anchor="middle" class="small">64 delay buckets</text>
  <text x="82" y="130" text-anchor="middle" class="small">(N1 baseline)</text>

  <line x1="145" y1="95" x2="168" y2="95" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 2: SPIKE DELIVERY (N2 enhanced) ===== -->
  <rect x="168" y="55" width="155" height="80" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="245" y="70" text-anchor="middle" class="small" font-weight="bold">STAGE 2</text>
  <text x="245" y="85" text-anchor="middle" font-weight="bold">SPIKE DELIVERY</text>

  <rect x="176" y="92" width="68" height="16" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="210" y="104" text-anchor="middle" class="small">4 formats</text>

  <rect x="249" y="92" width="68" height="16" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="283" y="104" text-anchor="middle" class="small">FMT_CONV</text>

  <rect x="176" y="112" width="141" height="16" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="246" y="124" text-anchor="middle" class="small">Variable-precision weights</text>

  <line x1="323" y1="95" x2="346" y2="95" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 3: NEURON UPDATE (N2 enhanced) ===== -->
  <rect x="346" y="55" width="155" height="80" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="423" y="70" text-anchor="middle" class="small" font-weight="bold">STAGE 3</text>
  <text x="423" y="85" text-anchor="middle" font-weight="bold">NEURON UPDATE</text>

  <rect x="354" y="92" width="68" height="16" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="388" y="104" text-anchor="middle" class="small">Microcode</text>

  <rect x="427" y="92" width="68" height="16" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="461" y="104" text-anchor="middle" class="small">Homeostat</text>

  <rect x="354" y="112" width="141" height="16" fill="none" stroke="black" stroke-width="1"/>
  <text x="424" y="124" text-anchor="middle" class="small">CUBA bypass (N1)</text>

  <line x1="501" y1="95" x2="524" y2="95" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 4: TRACE UPDATE (N2 enhanced) ===== -->
  <rect x="524" y="55" width="125" height="80" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="586" y="70" text-anchor="middle" class="small" font-weight="bold">STAGE 4</text>
  <text x="586" y="85" text-anchor="middle" font-weight="bold">TRACE UPDATE</text>

  <rect x="532" y="92" width="109" height="16" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="586" y="104" text-anchor="middle" class="small">5 traces (N2)</text>

  <rect x="532" y="112" width="109" height="16" fill="none" stroke="black" stroke-width="1"/>
  <text x="586" y="124" text-anchor="middle" class="small">2 traces (N1)</text>

  <line x1="649" y1="95" x2="672" y2="95" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 5: LEARNING (N2 enhanced) ===== -->
  <rect x="672" y="55" width="140" height="80" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="742" y="70" text-anchor="middle" class="small" font-weight="bold">STAGE 5</text>
  <text x="742" y="85" text-anchor="middle" font-weight="bold">LEARNING</text>

  <rect x="680" y="92" width="60" height="16" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="710" y="104" text-anchor="middle" class="small">grp skip</text>

  <rect x="745" y="92" width="60" height="16" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="775" y="104" text-anchor="middle" class="small">persist r</text>

  <rect x="680" y="112" width="126" height="16" fill="none" stroke="black" stroke-width="1"/>
  <text x="742" y="124" text-anchor="middle" class="small">14-opcode ucode (N1)</text>

  <!-- ===== Spike Output - arrow enters SPIKE OUT box from top ===== -->
  <line x1="812" y1="95" x2="865" y2="95" stroke="black" stroke-width="1.5"/>
  <line x1="865" y1="95" x2="865" y2="152" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="810" y="162" width="110" height="35" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="865" y="178" text-anchor="middle" class="small" font-weight="bold">SPIKE OUT</text>
  <text x="865" y="192" text-anchor="middle" class="small">(to mesh)</text>

  <!-- ===== DETAILED STAGE BREAKDOWNS ===== -->

  <!-- Stage 2 Detail: Spike Delivery - taller for padding -->
  <rect x="20" y="215" width="280" height="185" fill="none" stroke="black" stroke-width="2"/>
  <text x="160" y="234" text-anchor="middle" font-weight="bold">Stage 2: Spike Delivery Detail</text>
  <line x1="20" y1="240" x2="300" y2="240" stroke="black" stroke-width="0.5"/>

  <text x="35" y="258" class="small" font-weight="bold">N1 Baseline:</text>
  <text x="35" y="274" class="small">- Binary or 8-bit graded spikes</text>
  <text x="35" y="290" class="small">- 3 synapse formats (S/D/P)</text>
  <text x="35" y="306" class="small">- Fixed 8-bit weight precision</text>

  <text x="35" y="328" class="small" font-weight="bold">N2 Additions (dashed):</text>
  <text x="35" y="344" class="small">- 4 spike formats (0/8/16/24-bit)</text>
  <text x="35" y="360" class="small">- FMT_CONV shared-kernel format</text>
  <text x="35" y="376" class="small">- 1/2/4/8/16-bit weight packing</text>
  <text x="35" y="392" class="small">- Barrel shifter decompression</text>

  <!-- Stage 3 Detail: Neuron Update - taller for padding -->
  <rect x="320" y="215" width="280" height="185" fill="none" stroke="black" stroke-width="2"/>
  <text x="460" y="234" text-anchor="middle" font-weight="bold">Stage 3: Neuron Update Detail</text>
  <line x1="320" y1="240" x2="600" y2="240" stroke="black" stroke-width="0.5"/>

  <text x="335" y="258" class="small" font-weight="bold">N1 Baseline:</text>
  <text x="335" y="274" class="small">- Fixed CUBA: V = V*lam + I</text>
  <text x="335" y="290" class="small">- Threshold test + reset</text>
  <text x="335" y="306" class="small">- 4-compartment dendritic tree</text>

  <text x="335" y="328" class="small" font-weight="bold">N2 Additions (dashed):</text>
  <text x="335" y="344" class="small">- Microcode engine (256 instrs)</text>
  <text x="335" y="360" class="small">- R0-R15 register file</text>
  <text x="335" y="376" class="small">- HALT/EMIT termination</text>
  <text x="335" y="392" class="small">- Homeostatic theta adjustment</text>

  <!-- Stage 4+5 Detail: Traces + Learning - taller for padding -->
  <rect x="620" y="215" width="310" height="185" fill="none" stroke="black" stroke-width="2"/>
  <text x="775" y="234" text-anchor="middle" font-weight="bold">Stages 4-5: Traces + Learning</text>
  <line x1="620" y1="240" x2="930" y2="240" stroke="black" stroke-width="0.5"/>

  <text x="635" y="258" class="small" font-weight="bold">N1 Baseline:</text>
  <text x="635" y="274" class="small">- 2 traces (x1 pre, y1 post)</text>
  <text x="635" y="290" class="small">- Instant reward (tau_r=0)</text>
  <text x="635" y="306" class="small">- All-or-nothing learning</text>

  <text x="635" y="328" class="small" font-weight="bold">N2 Additions (dashed):</text>
  <text x="635" y="344" class="small">- 5 traces (x1, x2, y1, y2, y3)</text>
  <text x="635" y="360" class="small">- 7-bit learning registers</text>
  <text x="635" y="376" class="small">- Persistent reward (tau_r>0)</text>
  <text x="635" y="392" class="small">- Per-group learn_en skip</text>

  <!-- ===== Timing Diagram (simplified) ===== -->
  <rect x="20" y="420" width="910" height="130" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="440" text-anchor="middle" font-weight="bold">Single-Timestep Pipeline Execution Order</text>
  <line x1="20" y1="448" x2="930" y2="448" stroke="black" stroke-width="0.5"/>

  <!-- Phase blocks in a row with arrows between them at mid-height -->
  <rect x="45" y="462" width="115" height="35" fill="none" stroke="black" stroke-width="1"/>
  <text x="102" y="484" text-anchor="middle" class="small">DELAY DRAIN</text>

  <!-- Arrow between boxes -->
  <line x1="160" y1="479" x2="178" y2="479" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="178" y="462" width="130" height="35" fill="none" stroke="black" stroke-width="2"/>
  <text x="243" y="484" text-anchor="middle" class="small">SPIKE DELIVERY</text>

  <line x1="308" y1="479" x2="326" y2="479" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="326" y="462" width="130" height="35" fill="none" stroke="black" stroke-width="2"/>
  <text x="391" y="484" text-anchor="middle" class="small">NEURON UPDATE</text>

  <line x1="456" y1="479" x2="474" y2="479" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="474" y="462" width="110" height="35" fill="none" stroke="black" stroke-width="2"/>
  <text x="529" y="484" text-anchor="middle" class="small">TRACE UPD</text>

  <line x1="584" y1="479" x2="602" y2="479" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="602" y="462" width="120" height="35" fill="none" stroke="black" stroke-width="2"/>
  <text x="662" y="484" text-anchor="middle" class="small">LEARNING</text>

  <line x1="722" y1="479" x2="740" y2="479" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="740" y="462" width="80" height="35" fill="none" stroke="black" stroke-width="1"/>
  <text x="780" y="484" text-anchor="middle" class="small">EMIT</text>

  <!-- "time" arrow label inside the box -->
  <text x="860" y="484" class="small">time --></text>

  <text x="475" y="520" text-anchor="middle" class="small">Bold borders = N2-enhanced stages. All five stages execute sequentially within one timestep per core.</text>

  <!-- ===== Key N2 Enhancements Summary ===== -->
  <rect x="20" y="565" width="910" height="155" fill="none" stroke="black" stroke-width="1"/>
  <text x="475" y="585" text-anchor="middle" font-weight="bold">Summary: N2 Enhancements Over N1 Baseline</text>
  <line x1="20" y1="592" x2="930" y2="592" stroke="black" stroke-width="0.5"/>

  <text x="40" y="610" class="small" font-weight="bold">Feature</text>
  <text x="280" y="610" class="small" font-weight="bold">N1 (Baseline)</text>
  <text x="580" y="610" class="small" font-weight="bold">N2 (This Invention)</text>

  <text x="40" y="630" class="small">Neuron model</text>
  <text x="280" y="630" class="small">Fixed CUBA only</text>
  <text x="580" y="630" class="small">Programmable microcode (256 instr, 16 regs)</text>

  <text x="40" y="648" class="small">Weight precision</text>
  <text x="280" y="648" class="small">Fixed 8-bit</text>
  <text x="580" y="648" class="small">Variable 1/2/4/8/16-bit + barrel shifter</text>

  <text x="40" y="666" class="small">Spike payload</text>
  <text x="280" y="666" class="small">Binary or 8-bit</text>
  <text x="580" y="666" class="small">Binary, 8-bit, 16-bit, or 24-bit</text>

  <text x="40" y="684" class="small">Eligibility traces</text>
  <text x="280" y="684" class="small">2 (x1, y1)</text>
  <text x="580" y="684" class="small">5 (x1, x2, y1, y2, y3) with 7-bit registers</text>

  <text x="40" y="702" class="small">Learning control</text>
  <text x="280" y="702" class="small">All-or-nothing, instant reward</text>
  <text x="580" y="702" class="small">Per-group enable, persistent reward, homeostasis</text>
</svg>