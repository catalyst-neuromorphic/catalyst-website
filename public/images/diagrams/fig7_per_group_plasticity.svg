<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="950" height="880" viewBox="0 0 950 880">
  <style>
    text { font-family: Arial, sans-serif; font-size: 11px; fill: black; }
    .title { font-size: 14px; font-weight: bold; }
    .label { font-size: 10px; }
    .small { font-size: 9px; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="475" y="28" text-anchor="middle" class="title">Figure 7: Per-Synapse-Group Plasticity Enable</text>

  <!-- ===== Index Table with learn_en bit ===== -->
  <rect x="30" y="48" width="890" height="200" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="70" text-anchor="middle" font-weight="bold">Index Table Entries with learn_en Bit (MSB)</text>
  <line x1="30" y1="78" x2="920" y2="78" stroke="black" stroke-width="0.5"/>

  <!-- Group 0 (plastic) -->
  <text x="50" y="104" class="label" font-weight="bold">Group 0:</text>
  <rect x="140" y="88" width="35" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="157" y="106" text-anchor="middle" class="small" font-weight="bold">1</text>
  <rect x="175" y="88" width="100" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="225" y="106" text-anchor="middle" class="small">pool_base</text>
  <rect x="275" y="88" width="80" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="315" y="106" text-anchor="middle" class="small">num_syn</text>
  <rect x="355" y="88" width="60" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="385" y="106" text-anchor="middle" class="small">prec</text>
  <rect x="415" y="88" width="60" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="445" y="106" text-anchor="middle" class="small">fmt</text>
  <text x="510" y="106" class="small" font-weight="bold">PLASTIC (learn_en=1)</text>

  <!-- Group 1 (fixed) -->
  <text x="50" y="140" class="label" font-weight="bold">Group 1:</text>
  <rect x="140" y="124" width="35" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="157" y="142" text-anchor="middle" class="small" font-weight="bold">0</text>
  <rect x="175" y="124" width="100" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="225" y="142" text-anchor="middle" class="small">pool_base</text>
  <rect x="275" y="124" width="80" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="315" y="142" text-anchor="middle" class="small">num_syn</text>
  <rect x="355" y="124" width="60" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="385" y="142" text-anchor="middle" class="small">prec</text>
  <rect x="415" y="124" width="60" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="445" y="142" text-anchor="middle" class="small">fmt</text>
  <text x="510" y="142" class="small">FIXED (learn_en=0)</text>

  <!-- Group 2 (plastic) -->
  <text x="50" y="176" class="label" font-weight="bold">Group 2:</text>
  <rect x="140" y="160" width="35" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="157" y="178" text-anchor="middle" class="small" font-weight="bold">1</text>
  <rect x="175" y="160" width="100" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="225" y="178" text-anchor="middle" class="small">pool_base</text>
  <rect x="275" y="160" width="80" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="315" y="178" text-anchor="middle" class="small">num_syn</text>
  <rect x="355" y="160" width="60" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="385" y="178" text-anchor="middle" class="small">prec</text>
  <rect x="415" y="160" width="60" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="445" y="178" text-anchor="middle" class="small">fmt</text>
  <text x="510" y="178" class="small" font-weight="bold">PLASTIC (learn_en=1)</text>

  <!-- Group 3 (fixed) -->
  <text x="50" y="212" class="label" font-weight="bold">Group 3:</text>
  <rect x="140" y="196" width="35" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="157" y="214" text-anchor="middle" class="small" font-weight="bold">0</text>
  <rect x="175" y="196" width="100" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="225" y="214" text-anchor="middle" class="small">pool_base</text>
  <rect x="275" y="196" width="80" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="315" y="214" text-anchor="middle" class="small">num_syn</text>
  <rect x="355" y="196" width="60" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="385" y="214" text-anchor="middle" class="small">prec</text>
  <rect x="415" y="196" width="60" height="26" fill="none" stroke="black" stroke-width="1"/>
  <text x="445" y="214" text-anchor="middle" class="small">fmt</text>
  <text x="510" y="214" class="small">FIXED (learn_en=0)</text>

  <!-- MSB label - simple arrow pointing up to the learn_en column -->
  <text x="90" y="244" text-anchor="middle" class="small" font-weight="bold">MSB</text>
  <line x1="110" y1="240" x2="148" y2="222" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Learning Engine FSM with Skip Logic ===== -->
  <!-- "loop until all groups processed" text ABOVE the box -->
  <text x="475" y="274" text-anchor="middle" class="small" font-style="italic">loop until all groups processed</text>

  <rect x="30" y="284" width="890" height="240" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="308" text-anchor="middle" font-weight="bold">Learning Engine FSM with Per-Group Skip Logic</text>
  <line x1="30" y1="316" x2="920" y2="316" stroke="black" stroke-width="0.5"/>

  <!-- FSM states - spread wide with generous spacing -->
  <!-- START -->
  <rect x="50" y="340" width="120" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="110" y="362" text-anchor="middle" class="small">START</text>
  <text x="110" y="378" text-anchor="middle" class="small">group_idx=0</text>

  <!-- Arrow START -> CHECK -->
  <line x1="170" y1="365" x2="220" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CHECK learn_en -->
  <rect x="220" y="340" width="150" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="295" y="360" text-anchor="middle" class="small" font-weight="bold">CHECK learn_en</text>
  <text x="295" y="378" text-anchor="middle" class="small">read idx[group].MSB</text>

  <!-- Process path (learn_en=1): CHECK -> COMPUTE dw -->
  <line x1="370" y1="365" x2="430" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="355" text-anchor="middle" class="small">en=1</text>

  <!-- COMPUTE dw -->
  <rect x="430" y="340" width="140" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="500" y="360" text-anchor="middle" class="small">COMPUTE dw</text>
  <text x="500" y="378" text-anchor="middle" class="small">(microcode eval)</text>

  <!-- Arrow COMPUTE -> UPDATE -->
  <line x1="570" y1="365" x2="620" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- UPDATE w -->
  <rect x="620" y="340" width="120" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="680" y="362" text-anchor="middle" class="small">UPDATE w</text>
  <text x="680" y="378" text-anchor="middle" class="small">w += dw</text>

  <!-- Arrow UPDATE -> NEXT GROUP -->
  <line x1="740" y1="365" x2="790" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NEXT GROUP -->
  <rect x="790" y="340" width="120" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="850" y="362" text-anchor="middle" class="small">NEXT GROUP</text>
  <text x="850" y="378" text-anchor="middle" class="small">group_idx++</text>

  <!-- Loop back arrow: NEXT GROUP -> CHECK learn_en (goes above the boxes) -->
  <line x1="850" y1="340" x2="850" y2="326" stroke="black" stroke-width="1"/>
  <line x1="850" y1="326" x2="295" y2="326" stroke="black" stroke-width="1"/>
  <line x1="295" y1="326" x2="295" y2="340" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Skip path (learn_en=0): CHECK -> NEXT GROUP, routes BELOW all boxes -->
  <line x1="295" y1="390" x2="295" y2="440" stroke="black" stroke-width="1.5"/>
  <line x1="295" y1="440" x2="850" y2="440" stroke="black" stroke-width="1.5"/>
  <line x1="850" y1="440" x2="850" y2="390" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="475" y="460" text-anchor="middle" class="small">en=0</text>
  <text x="575" y="478" text-anchor="middle" class="small" font-weight="bold">SKIP (learn_en=0): bypass entire group</text>

  <!-- ===== Mixed Network Example ===== -->
  <rect x="30" y="530" width="890" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="552" text-anchor="middle" font-weight="bold">Mixed Plastic/Fixed Network Example</text>
  <line x1="30" y1="560" x2="920" y2="560" stroke="black" stroke-width="0.5"/>

  <!-- Input layer (fixed) - wider boxes -->
  <rect x="50" y="575" width="190" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="145" y="593" text-anchor="middle" class="small" font-weight="bold">Input Synapses</text>
  <text x="145" y="610" text-anchor="middle" class="small">learn_en = 0 (Fixed)</text>
  <text x="145" y="625" text-anchor="middle" class="small" font-style="italic">Sensory encoding</text>

  <line x1="240" y1="605" x2="275" y2="605" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Hidden layer (plastic) -->
  <rect x="275" y="575" width="190" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="370" y="593" text-anchor="middle" class="small" font-weight="bold">Hidden Synapses</text>
  <text x="370" y="610" text-anchor="middle" class="small">learn_en = 1 (Plastic)</text>
  <text x="370" y="625" text-anchor="middle" class="small" font-style="italic">STDP + reward learning</text>

  <line x1="465" y1="605" x2="500" y2="605" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Recurrent (plastic) -->
  <rect x="500" y="575" width="190" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="595" y="593" text-anchor="middle" class="small" font-weight="bold">Recurrent Synapses</text>
  <text x="595" y="610" text-anchor="middle" class="small">learn_en = 1 (Plastic)</text>
  <text x="595" y="625" text-anchor="middle" class="small" font-style="italic">Homeostatic learning</text>

  <line x1="690" y1="605" x2="725" y2="605" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output (fixed) -->
  <rect x="725" y="575" width="190" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="820" y="593" text-anchor="middle" class="small" font-weight="bold">Output Synapses</text>
  <text x="820" y="610" text-anchor="middle" class="small">learn_en = 0 (Fixed)</text>
  <text x="820" y="625" text-anchor="middle" class="small" font-style="italic">Readout layer</text>

  <!-- ===== LTP/LTD Selective Bitmap ===== -->
  <rect x="30" y="670" width="890" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="692" text-anchor="middle" font-weight="bold">LTP/LTD Selective Enable Bitmap</text>
  <line x1="30" y1="700" x2="920" y2="700" stroke="black" stroke-width="0.5"/>

  <text x="50" y="720" class="small">In addition to learn_en, each synapse group has independent LTP and LTD enable bits:</text>

  <!-- LTP/LTD combo boxes (fit within 890px container: x=30 to x=920) -->
  <rect x="45" y="735" width="200" height="30" fill="none" stroke="black" stroke-width="1"/>
  <text x="145" y="755" text-anchor="middle" class="small">ltp_en=1, ltd_en=1: Full STDP</text>

  <rect x="260" y="735" width="195" height="30" fill="none" stroke="black" stroke-width="1"/>
  <text x="357" y="755" text-anchor="middle" class="small">ltp_en=1, ltd_en=0: LTP only</text>

  <rect x="470" y="735" width="195" height="30" fill="none" stroke="black" stroke-width="1"/>
  <text x="567" y="755" text-anchor="middle" class="small">ltp_en=0, ltd_en=1: LTD only</text>

  <rect x="680" y="735" width="220" height="30" fill="none" stroke="black" stroke-width="1"/>
  <text x="790" y="755" text-anchor="middle" class="small">ltp_en=0, ltd_en=0: No learning</text>
</svg>